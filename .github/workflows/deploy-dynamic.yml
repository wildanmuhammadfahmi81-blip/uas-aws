name: Deploy Dynamic App

on:
  push:
    branches: [main]
    paths:
      - "dynamic-app/**"
      - "database/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/deploy-dynamic.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dynamic image
        uses: docker/build-push-action@v6
        with:
          context: ./dynamic-app
          push: true
          tags: ${{ secrets.DYNAMIC_IMAGE }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            if [ ! -d "$HOME/uas-aws/.git" ]; then
              rm -rf "$HOME/uas-aws"
              git clone https://github.com/wildanmuhammadfahmi81-blip/uas-aws.git "$HOME/uas-aws"
            fi
            cd "$HOME/uas-aws"
            git fetch origin main
            git reset --hard origin/main
            cat > .env <<EOF
            APP_NAME=UAS Administrasi Server
            STATIC_IMAGE=${{ secrets.STATIC_IMAGE }}
            DYNAMIC_IMAGE=${{ secrets.DYNAMIC_IMAGE }}
            HTTP_PORT=80
            DYNAMIC_PORT=8080
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF
            docker compose pull dynamic-app
            docker rm -f uas-static-cv uas-reverse-proxy uas-dynamic-app uas-mariadb 2>/dev/null || true
            docker compose up -d mariadb dynamic-app reverse-proxy
            docker image prune -f
